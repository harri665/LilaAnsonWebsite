services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: lila-server
    ports:
      - "5601:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
    networks:
      - lila-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: lila-client
    ports:
      - "5600:80"
    depends_on:
      - server
    networks:
      - lila-network
    restart: unless-stopped

networks:
  lila-network:
    driver: bridge